# =========================
# Namespace
# =========================
apiVersion: v1
kind: Namespace
metadata:
  name: fgb-web-receiving
---
# =========================
# Persistent Volume - Storage
# =========================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: fgb-web-receiving-storage-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  nfs:
    server: 10.129.78.124
    path: /kubernetes/fgb-web-receiving/storage
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fgb-web-receiving-storage-pvc
  namespace: fgb-web-receiving
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  volumeName: fgb-web-receiving-storage-pv
  storageClassName: ""
---
# =========================
# Persistent Volume - Cache
# =========================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: fgb-web-receiving-cache-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  nfs:
    server: 10.129.78.124
    path: /kubernetes/fgb-web-receiving/cache
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fgb-web-receiving-cache-pvc
  namespace: fgb-web-receiving
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  volumeName: fgb-web-receiving-cache-pv
  storageClassName: ""
---
# =========================
# Persistent Volume - Upload (FIX)
# =========================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: fgb-web-receiving-uploads-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  nfs:
    server: 10.129.78.124
    path: /kubernetes/fgb-web-receiving/uploads
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fgb-web-receiving-uploads-pvc
  namespace: fgb-web-receiving
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  volumeName: fgb-web-receiving-uploads-pv
  storageClassName: ""
---
# =========================
# ConfigMap - Nginx
# =========================
apiVersion: v1
kind: ConfigMap
metadata:
  name: laravel-nginx-conf
  namespace: fgb-web-receiving
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /var/www/public;
        index index.php index.html;

        client_max_body_size 200M;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass laravel-php-service:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }

        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
            expires max;
            access_log off;
        }

        location ~ /\. {
            deny all;
        }
    }
---
# =========================
# Deployment - PHP-FPM
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-php
  namespace: fgb-web-receiving
spec:
  replicas: 3
  selector:
    matchLabels:
      app: laravel-php
  template:
    metadata:
      labels:
        app: laravel-php
    spec:
      securityContext:
        fsGroup: 33
      imagePullSecrets:
        - name: regcred
      containers:
        - name: php
          image: 10.129.78.111:1111/barcode/fgb-web-receiving-php:IMAGE_TAG
          ports:
            - containerPort: 9000
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: laravel-storage
              mountPath: /var/www/storage
            - name: laravel-cache
              mountPath: /var/www/bootstrap/cache
            - name: laravel-uploads
              mountPath: /var/www/public/uploads
      volumes:
        - name: laravel-storage
          persistentVolumeClaim:
            claimName: fgb-web-receiving-storage-pvc
        - name: laravel-cache
          persistentVolumeClaim:
            claimName: fgb-web-receiving-cache-pvc
        - name: laravel-uploads
          persistentVolumeClaim:
            claimName: fgb-web-receiving-uploads-pvc
---
# =========================
# Service - PHP-FPM
# =========================
apiVersion: v1
kind: Service
metadata:
  name: laravel-php-service
  namespace: fgb-web-receiving
spec:
  selector:
    app: laravel-php
  ports:
    - port: 9000
      targetPort: 9000
---
# =========================
# Deployment - Nginx
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-nginx
  namespace: fgb-web-receiving
spec:
  replicas: 3
  selector:
    matchLabels:
      app: laravel-nginx
  template:
    metadata:
      labels:
        app: laravel-nginx
    spec:
      securityContext:
        fsGroup: 33
      imagePullSecrets:
        - name: regcred
      containers:
        - name: nginx
          image: 10.129.78.111:1111/barcode/fgb-web-receiving-nginx:IMAGE_TAG
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: laravel-storage
              mountPath: /var/www/storage
            - name: laravel-cache
              mountPath: /var/www/bootstrap/cache
            - name: laravel-uploads
              mountPath: /var/www/public/uploads
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: laravel-storage
          persistentVolumeClaim:
            claimName: fgb-web-receiving-storage-pvc
        - name: laravel-cache
          persistentVolumeClaim:
            claimName: fgb-web-receiving-cache-pvc
        - name: laravel-uploads
          persistentVolumeClaim:
            claimName: fgb-web-receiving-uploads-pvc
        - name: nginx-conf
          configMap:
            name: laravel-nginx-conf
---
# =========================
# Service - Nginx NodePort
# =========================
apiVersion: v1
kind: Service
metadata:
  name: laravel-service
  namespace: fgb-web-receiving
spec:
  type: NodePort
  selector:
    app: laravel-nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30009
---
